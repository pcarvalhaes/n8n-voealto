<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voe Alto | Cinematic Transformation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020202;
            --gold: #C9A227;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .overlay {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .content {
            text-align: center;
            opacity: 0;
            transform: scale(0.95);
            filter: blur(8px);
            transition: opacity 3s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 3s cubic-bezier(0.16, 1, 0.3, 1), 
                        filter 3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .content.visible {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
        }

        h1 {
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 200;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(201, 162, 39, 0.3));
        }

        .subtitle {
            font-size: clamp(0.6rem, 1.2vw, 0.9rem);
            font-weight: 400;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 1rem;
        }

        /* Cinematic vignettes */
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.92) 100%);
            z-index: 5;
            pointer-events: none;
        }

        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease;
        }

        .loader-bar {
            width: 140px; height: 1px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .loader-progress {
            position: absolute; height: 100%; width: 0%;
            background: var(--gold);
            transition: width 1s ease;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-bar"><div class="loader-progress" id="load-progress"></div></div>
    </div>

    <div class="vignette"></div>
    <div id="canvas-container"></div>

    <div class="overlay">
        <div class="content" id="main-content">
            <h1>Voe Alto</h1>
            <div class="subtitle">Consultoria</div>
        </div>
    </div>

    <!-- Three.js + GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        const CONFIG = {
            particleCount: 16000,
            colors: {
                flame: new THREE.Color(0xFF6A00), 
                liquid: new THREE.Color(0xFFD700),
                white: new THREE.Color(0xFFFFFF)
            }
        };

        let scene, camera, renderer, composer, particles, geometry, material;
        let velocities = [];
        let state = 'init'; 
        let wingExpansion = 0.2;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const renderPass = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                2.5, 0.5, 0.8
            );
            bloomPass.threshold = 0.05;
            bloomPass.strength = 1.8;
            bloomPass.radius = 0.8;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            createPhoenix();
            animate();
            
            document.getElementById('load-progress').style.width = '100%';
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    runFullSequence();
                }, 1500);
            }, 500);
        }

        function getPhoenixPos(i, expansion) {
            const section = i % 4;
            const p = (i / CONFIG.particleCount) * 4 % 1;
            let x = 0, y = 0, z = 0;

            if (section === 0) { // Wings
                x = -5 * Math.pow(p, 0.6) * expansion;
                y = 3 * Math.sin(p * 1.5) + p;
            } else if (section === 1) {
                x = 5 * Math.pow(p, 0.6) * expansion;
                y = 3 * Math.sin(p * 1.5) + p;
            } else if (section === 2) { // Body
                x = Math.sin(p * 10) * 0.1;
                y = -p * 6 + 2;
            } else { // Tail
                x = Math.sin(p * 6) * 1.5 * p;
                y = -4 - p * 4;
            }
            return { x, y, z };
        }

        function createPhoenix() {
            geometry = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.particleCount * 3);
            const col = new Float32Array(CONFIG.particleCount * 3);
            const sizes = new Float32Array(CONFIG.particleCount);

            for (let i = 0; i < CONFIG.particleCount; i++) {
                const initialPos = getPhoenixPos(i, wingExpansion);
                pos[i * 3] = initialPos.x;
                pos[i * 3 + 1] = initialPos.y - 12; 
                pos[i * 3 + 2] = initialPos.z;

                col[i * 3] = CONFIG.colors.flame.r;
                col[i * 3 + 1] = CONFIG.colors.flame.g;
                col[i * 3 + 2] = CONFIG.colors.flame.b;

                sizes[i] = Math.random() * 3.0 + 0.1;
                velocities.push({ noise: Math.random() * 50 });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(col, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            material = new THREE.PointsMaterial({
                size: 0.1,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                map: createParticleTexture(),
                opacity: 0.9
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gr = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gr.addColorStop(0, 'rgba(255,255,255,1)');
            gr.addColorStop(0.4, 'rgba(255,255,255,0.3)');
            gr.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gr;
            ctx.beginPath(); ctx.arc(32, 32, 32, 0, Math.PI * 2); ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }

        async function runFullSequence() {
            state = 'rise';
            // 1. Rise & Expand
            gsap.to(particles.position, { y: 11, duration: 8, ease: "power2.inOut" });
            gsap.to(this, {
                wingExpansion: 1.1,
                duration: 7,
                ease: "power1.inOut",
                onUpdate: () => updatePhoenixShape()
            });

            await new Promise(r => setTimeout(r, 8500));
            state = 'dissolve';

            // 2. Dissolve & Inward Collapse
            const pos = geometry.attributes.position.array;
            const col = geometry.attributes.color.array;

            for (let i = 0; i < CONFIG.particleCount; i++) {
                // First explode out slightly
                gsap.to(pos, {
                    [i * 3]: pos[i * 3] * 1.5 + (Math.random() - 0.5) * 5,
                    [i * 3 + 1]: (pos[i * 3 + 1] + 11) * 1.2 + (Math.random() - 0.5) * 5,
                    [i * 3 + 2]: pos[i * 3 + 2] * 1.5 + (Math.random() - 0.5) * 5,
                    duration: 1.5,
                    ease: "power2.out"
                });
            }

            await new Promise(r => setTimeout(r, 1500));
            state = 'collapse';

            for (let i = 0; i < CONFIG.particleCount; i++) {
                // Collapse inward to a single point
                gsap.to(pos, {
                    [i * 3]: 0,
                    [i * 3 + 1]: 11,
                    [i * 3 + 2]: 0,
                    duration: 1.2,
                    ease: "power4.in"
                });
                gsap.to(col, {
                    [i * 3]: 1, [i * 3 + 1]: 1, [i * 3 + 2]: 1,
                    duration: 1
                });
            }

            await new Promise(r => setTimeout(r, 1200));
            state = 'transform';

            // 3. Reveal Brand
            for (let i = 0; i < CONFIG.particleCount; i++) {
                gsap.to(pos, {
                    [i * 3]: (Math.random() - 0.5) * 20,
                    [i * 3 + 1]: (Math.random() - 0.5) * 12 + 11,
                    [i * 3 + 2]: (Math.random() - 0.5) * 10,
                    duration: 4,
                    ease: "power2.out"
                });
            }

            setTimeout(() => {
                document.getElementById('main-content').classList.add('visible');
            }, 1000);

            // Subtle camera loop
            gsap.to(camera.position, { z: 12, duration: 20, repeat: -1, yoyo: true, ease: "sine.inOut" });
        }

        function updatePhoenixShape() {
            const pos = geometry.attributes.position.array;
            for (let i = 0; i < CONFIG.particleCount; i++) {
                const target = getPhoenixPos(i, wingExpansion);
                pos[i * 3] = target.x;
                pos[i * 3 + 1] = target.y;
                pos[i * 3 + 2] = target.z;
            }
            geometry.attributes.position.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const pos = geometry.attributes.position.array;

            if (state === 'rise' || state === 'dissolve') {
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    pos[i * 3] += Math.sin(time + i) * 0.002;
                    pos[i * 3 + 1] += Math.cos(time + i) * 0.002;
                }
                geometry.attributes.position.needsUpdate = true;
                particles.rotation.y += 0.002;
            }

            if (state === 'transform') {
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    pos[i * 3 + 1] += Math.sin(time + i) * 0.005;
                }
                geometry.attributes.position.needsUpdate = true;
                material.opacity *= 0.998;
            }

            camera.position.x += (Math.sin(time * 0.3) * 0.4 - camera.position.x) * 0.02;
            camera.lookAt(0, camera.position.y * 0.8, 0);
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
